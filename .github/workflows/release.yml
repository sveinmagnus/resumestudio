# Build the portable desktop bundle on Windows, macOS, and Linux when a
# version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# then attach the artifacts to the matching GitHub Release.
#
# Two asset families are uploaded per release:
#   1. ResumeStudio-<os>.(zip|tar.gz)        — human download (docs/download.md
#      links to these; filenames MUST stay stable or those URLs 404).
#   2. resume-studio-<os>-<arch>.tar.gz      — the AUTO-UPDATER asset, emitted by
#      `npm run build:desktop` into release-dist/. Names MUST match
#      server/desktop/updater.ts `assetNameFor`, and the format MUST be .tar.gz
#      (the in-app updater extracts with `tar -xzf`). Do not rename these.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required by softprops/action-gh-release to attach assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: ResumeStudio-windows-x64.zip
            archive: zip
          - os: macos-latest
            asset: ResumeStudio-macos.zip
            archive: zip
          - os: ubuntu-latest
            asset: ResumeStudio-linux-x64.tar.gz
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 LTS, not 20: Node 20 is EOL (April 2026) and
          # better-sqlite3 v12.10+ no longer publishes Node-20 (abi115)
          # prebuilds, so 20.x forces a from-source compile that the
          # windows-latest VS 18 image cannot do (node-gyp can't drive it).
          # rolldown (vitest) also requires >= 22.12. Node 22 has prebuilt
          # better-sqlite3 binaries (abi127) on every OS. Note this is also
          # the Node bundled into the desktop build (build-desktop copies
          # process.execPath).
          node-version: '22'
          cache: 'npm'

      # Single source of truth for a PUBLISHED build's version = the git tag.
      # We bake it in via RESUME_APP_VERSION (build-desktop.mjs + server/version.ts
      # both honour it) AND hard-fail if package.json drifted from the tag, so a
      # forgotten version bump can never again ship artifacts that self-report a
      # stale version (which also caused a perpetual "update available" loop).
      - name: Resolve & verify version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v$TAG_VERSION  package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json ($PKG_VERSION). Bump package.json AND package-lock.json to $TAG_VERSION, commit, then re-tag."
            exit 1
          fi
          echo "RESUME_APP_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      # The repo's package-lock.json is generated by npm 11; older bundled
      # npms can mis-install platform-specific optional deps (npm/cli#4828 —
      # rolldown bindings go missing and vitest dies at startup). Cheap
      # insurance: always run the lockfile's own npm generation.
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # Sanity gate so a broken tag never auto-updates users in the field.
      - name: Typecheck & test
        run: npm run typecheck && npm test

      # Builds the React client + assembles the portable release/ folder with
      # the bundled Node binary and better-sqlite3 native addon for THIS OS,
      # and emits release-dist/resume-studio-<os>-<arch>.tar.gz (updater asset).
      - name: Build desktop bundle
        run: npm run build:desktop

      # Stage release/ under a top-level ResumeStudio/ folder so the user
      # gets a clean directory when they unzip, not loose files.
      - name: Stage release folder
        shell: bash
        run: |
          mkdir -p staging/ResumeStudio
          cp -R release/. staging/ResumeStudio/

      - name: Package (zip)
        if: matrix.archive == 'zip' && runner.os != 'Windows'
        shell: bash
        run: |
          cd staging
          zip -r "../${{ matrix.asset }}" ResumeStudio

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path staging\ResumeStudio -DestinationPath ${{ matrix.asset }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "${{ matrix.asset }}" -C staging ResumeStudio

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Both the human-download bundle and the auto-updater .tar.gz.
          files: |
            ${{ matrix.asset }}
            release-dist/*.tar.gz
          # Auto-creates the release on first asset upload for this tag, and
          # appends artifacts from each matrix job to the same release.
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
