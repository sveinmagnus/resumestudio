# Build the portable desktop bundle on Windows, macOS, and Linux when a
# version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# then attach the artifacts to the matching GitHub Release.
#
# Two asset families are uploaded per release:
#   1. ResumeStudio-<os>.(zip|tar.gz)        — human download (docs/download.md
#      links to these; filenames MUST stay stable or those URLs 404).
#   2. resume-studio-<os>-<arch>.tar.gz      — the AUTO-UPDATER asset, emitted by
#      `npm run build:desktop` into release-dist/. Names MUST match
#      server/desktop/updater.ts `assetNameFor`, and the format MUST be .tar.gz
#      (the in-app updater extracts with `tar -xzf`). Do not rename these.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required by softprops/action-gh-release to attach assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: ResumeStudio-windows-x64.zip
            archive: zip
          - os: macos-latest
            asset: ResumeStudio-macos.zip
            archive: zip
          - os: ubuntu-latest
            asset: ResumeStudio-linux-x64.tar.gz
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Pinned, not '20': better-sqlite3's prebuild-install resolves its
          # binary via node-abi, which lags brand-new Node patch releases. An
          # unknown patch (e.g. 20.20.2) finds no prebuilt and falls back to
          # node-gyp, which can't drive the runner's Visual Studio 18 image —
          # the Windows build dies. This is also the Node bundled into the
          # desktop build (build-desktop copies process.execPath), so bump it
          # deliberately, never by float.
          node-version: '20.18.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Sanity gate so a broken tag never auto-updates users in the field.
      - name: Typecheck & test
        run: npm run typecheck && npm test

      # Builds the React client + assembles the portable release/ folder with
      # the bundled Node binary and better-sqlite3 native addon for THIS OS,
      # and emits release-dist/resume-studio-<os>-<arch>.tar.gz (updater asset).
      - name: Build desktop bundle
        run: npm run build:desktop

      # Stage release/ under a top-level ResumeStudio/ folder so the user
      # gets a clean directory when they unzip, not loose files.
      - name: Stage release folder
        shell: bash
        run: |
          mkdir -p staging/ResumeStudio
          cp -R release/. staging/ResumeStudio/

      - name: Package (zip)
        if: matrix.archive == 'zip' && runner.os != 'Windows'
        shell: bash
        run: |
          cd staging
          zip -r "../${{ matrix.asset }}" ResumeStudio

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path staging\ResumeStudio -DestinationPath ${{ matrix.asset }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "${{ matrix.asset }}" -C staging ResumeStudio

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Both the human-download bundle and the auto-updater .tar.gz.
          files: |
            ${{ matrix.asset }}
            release-dist/*.tar.gz
          # Auto-creates the release on first asset upload for this tag, and
          # appends artifacts from each matrix job to the same release.
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
