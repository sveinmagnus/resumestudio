# Build the portable desktop bundle on Windows, macOS, and Linux when a
# version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# then attach the artifacts to the matching GitHub Release.
#
# Asset families uploaded per release:
#   1. ResumeStudio-<os>.(zip|tar.gz)        — human download (docs/download.md
#      links to these; filenames MUST stay stable or those URLs 404).
#   2. resume-studio-<os>-<arch>.tar.gz      — the AUTO-UPDATER asset, emitted by
#      `npm run build:desktop` into release-dist/. Names MUST match
#      server/desktop/updater.ts `assetNameFor`, and the format MUST be .tar.gz
#      (the in-app updater extracts with `tar -xzf`). Do not rename these.
#   3. resume-studio-<os>-<arch>.tar.gz.sha256 — the checksum sidecar for (2),
#      emitted by the same build script. The updater FAILS CLOSED without it:
#      drop these and every desktop build in the field stops updating.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required by softprops/action-gh-release to attach assets

jobs:
  # Create the release EXACTLY once, before any build job runs.
  #
  # This job exists because the alternative raced. The build matrix used to let
  # each job "auto-create the release on first asset upload", which is a
  # check-then-act: all three OS jobs start together, all see no release for the
  # tag, and all create one. On v0.8.0 that produced TWO releases for v0.8.0 —
  # a published one with linux+windows and a stray draft holding the macOS
  # artifacts — so the public release shipped with no macOS download.
  #
  # With the release already present, every matrix job takes the "update
  # existing" path instead, which is idempotent.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      # Verify BEFORE creating anything: a version mismatch must fail with no
      # release published, not leave an empty one behind. Mirrors the per-build
      # check below (which still runs, since each build bakes in the version).
      - name: Verify version matches the tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v$TAG_VERSION  package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json ($PKG_VERSION). Bump package.json AND package-lock.json to $TAG_VERSION, commit, then re-tag."
            exit 1
          fi

      - name: Create the release (no assets yet)
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          draft: false
          prerelease: false

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: ResumeStudio-windows-x64.zip
            archive: zip
          - os: macos-latest
            asset: ResumeStudio-macos.zip
            archive: zip
          - os: ubuntu-latest
            asset: ResumeStudio-linux-x64.tar.gz
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Node 22 LTS, not 20: Node 20 is EOL (April 2026) and
          # better-sqlite3 v12.10+ no longer publishes Node-20 (abi115)
          # prebuilds, so 20.x forces a from-source compile that the
          # windows-latest VS 18 image cannot do (node-gyp can't drive it).
          # rolldown (vitest) also requires >= 22.12. Node 22 has prebuilt
          # better-sqlite3 binaries (abi127) on every OS. Note this is also
          # the Node bundled into the desktop build (build-desktop copies
          # process.execPath).
          node-version: '22'
          cache: 'npm'

      # Single source of truth for a PUBLISHED build's version = the git tag.
      # We bake it in via RESUME_APP_VERSION (build-desktop.mjs + server/version.ts
      # both honour it) AND hard-fail if package.json drifted from the tag, so a
      # forgotten version bump can never again ship artifacts that self-report a
      # stale version (which also caused a perpetual "update available" loop).
      - name: Resolve & verify version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v$TAG_VERSION  package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json ($PKG_VERSION). Bump package.json AND package-lock.json to $TAG_VERSION, commit, then re-tag."
            exit 1
          fi
          echo "RESUME_APP_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      # The repo's package-lock.json is generated by npm 11; older bundled
      # npms can mis-install platform-specific optional deps (npm/cli#4828 —
      # rolldown bindings go missing and vitest dies at startup). Cheap
      # insurance: always run the lockfile's own npm generation.
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # Sanity gate so a broken tag never auto-updates users in the field.
      - name: Typecheck & test
        run: npm run typecheck && npm test

      # Builds the React client + assembles the portable release/ folder with
      # the bundled Node binary and better-sqlite3 native addon for THIS OS,
      # and emits release-dist/resume-studio-<os>-<arch>.tar.gz (updater asset).
      - name: Build desktop bundle
        run: npm run build:desktop

      # Stage release/ under a top-level ResumeStudio/ folder so the user
      # gets a clean directory when they unzip, not loose files.
      - name: Stage release folder
        shell: bash
        run: |
          mkdir -p staging/ResumeStudio
          cp -R release/. staging/ResumeStudio/

      - name: Package (zip)
        if: matrix.archive == 'zip' && runner.os != 'Windows'
        shell: bash
        run: |
          cd staging
          zip -r "../${{ matrix.asset }}" ResumeStudio

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path staging\ResumeStudio -DestinationPath ${{ matrix.asset }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "${{ matrix.asset }}" -C staging ResumeStudio

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          # The human-download bundle, plus the auto-updater .tar.gz and its
          # .sha256 sidecar (build-desktop.mjs emits both into release-dist/).
          files: |
            ${{ matrix.asset }}
            release-dist/*.tar.gz
            release-dist/*.tar.gz.sha256
          # The `create-release` job has already made the release for this tag,
          # so every matrix job appends to the SAME one. Do not remove that job
          # and rely on auto-create here: three jobs creating concurrently is
          # what split v0.8.0 across two releases.
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
