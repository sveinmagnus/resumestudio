# Knowledge Context Protocol manifest — https://github.com/Cantara/knowledge-context-protocol
# Agent-navigable map of this repo's knowledge. Declared, not duplicated: every unit
# points at an existing file. Keep `validated` dates honest — update them when you
# re-verify a unit's accuracy, and when you change a document, update its unit here.
kcp_version: "0.20"
project: resume-studio
version: 0.9.2
updated: "2026-07-23"
language: en
hints:
  recommended_entry_point: claude-instructions

units:
  # ── Instruction layer (eager — Claude Code auto-loads CLAUDE.md) ──────────
  - id: claude-instructions
    path: CLAUDE.md
    intent: "How must an agent work in this codebase? Architecture map, data model, store patterns, conventions (incl. the v0.3.1 accessibility invariants + the version source-of-truth rule), and what not to change. Holds invariants only — the exhaustive feature catalog is in feature-map."
    scope: global
    audience: [agent, developer]
    validated: "2026-07-24"
    update_frequency: weekly
    triggers: [conventions, architecture, data-model, store, persistence, sections, accessibility, routing]
    content_structure:
      primary: prose
      contains: [table, code]
      density: dense
    hints:
      token_estimate: 9700
      load_strategy: eager
      priority: critical

  - id: feature-map
    path: .claude/feature-map.md
    intent: "What features exist and how does each hang together? The exhaustive per-feature design catalog + the recently-shipped changelog, extracted from CLAUDE.md §1 to keep the instruction file lean."
    scope: global
    audience: [agent, developer]
    validated: "2026-07-23"
    update_frequency: weekly
    depends_on: [claude-instructions]
    triggers: [features, changelog, skills-showcase, skill-category, registry, resume-views, import, what-exists]
    not_for: ["coding conventions", "invariants / what not to change", "step-by-step procedures"]
    content_structure:
      primary: prose
      density: dense
    hints:
      token_estimate: 5400
      load_strategy: on_demand
      priority: supplementary

  # ── Project overviews ─────────────────────────────────────────────────────
  - id: readme
    path: README.md
    intent: "What is Resume Studio and how do I install, run, and configure it?"
    scope: global
    audience: [human, agent]
    validated: "2026-07-23"
    update_frequency: monthly
    triggers: [overview, quickstart, install, configuration, env]
    not_for: ["architecture", "data model", "code conventions"]
    hints:
      token_estimate: 2000
      priority: supplementary

  - id: desktop-guide
    path: DESKTOP.md
    intent: "How does the portable desktop build work — building, data dirs, cloud-folder sync, tray, tabbed in-app settings (translation + AI assist), and auto-update?"
    scope: project
    audience: [human, developer, agent]
    validated: "2026-07-24"
    update_frequency: monthly
    depends_on: [readme]
    triggers: [desktop, launcher, portable, tray, auto-update, sync, backup-folder]
    hints:
      token_estimate: 3900

  # ── Schemas ────────────────────────────────────────────────────────────────
  - id: data-model
    kind: schema
    path: src/types/index.ts
    intent: "What is the resume data model? Single source of truth for every entity, localized field, view-config type, cover letters (shape v10), profile competency bundles (KeyQualification.competency_ids, shape v12), and the shape_version stamp."
    format: text
    scope: global
    audience: [developer, agent]
    validated: "2026-07-23"
    update_frequency: monthly
    triggers: [types, entities, LocalizedString, ResumeStore, ResumeView, schema]
    not_for: ["runtime behavior", "business logic", "how a feature works"]
    content_structure:
      primary: code
      density: dense
    hints:
      token_estimate: 4300
      priority: critical

  - id: ai-import-schema
    kind: schema
    path: public/ai-import-template.md
    intent: "What is the resumestudio-ai/v1 exchange schema that external LLMs fill in for the bring-your-own-LLM CV import? (docs/ai-import-template.md mirrors it for the docs site.)"
    scope: module
    audience: [human, agent]
    validated: "2026-07-17"
    update_frequency: rarely
    triggers: [ai-import, byo-llm, exchange-schema, import]
    not_for: ["the internal ResumeStore data model"]
    content_structure:
      primary: prose
      contains: [code]
      density: normal
    hints:
      token_estimate: 1600

  # ── Agent skills (lazy — read before touching their domain) ───────────────
  - id: skill-store-persistence
    path: .claude/skills/store-and-persistence.md
    intent: "What rules govern the Zustand store, auto-save, boot, undo, offline sync, and the loadStore-vs-replaceData split? Includes the /api/resumes route grammar and the boot/save/conflict sequences."
    scope: module
    audience: [agent]
    validated: "2026-07-17"
    depends_on: [claude-instructions, data-model]
    triggers: [store, zustand, auto-save, undo, redo, mutationCount, localCache, persistence, offline, conflict, api-routes]
    hints:
      token_estimate: 2450

  - id: skill-export-pipeline
    path: .claude/skills/export-pipeline.md
    intent: "How do the render paths (HTML preview, pdfmake PDF, DOCX, ATS text/Markdown, Europass XML, cover letters) stay in agreement via the section-descriptor catalog, what is the lazy-load discipline, and why does no render path hold an English literal?"
    scope: module
    audience: [agent]
    validated: "2026-07-18"
    depends_on: [claude-instructions, data-model]
    triggers: [export, docx, pdf, viewFilter, exporter, buildViewHtml, preview, localization, locale, translation, chrome, exportStrings]
    hints:
      token_estimate: 1500

  - id: skill-security-review
    path: .claude/skills/security-review.md
    intent: "What escaping/sanitising rules protect the render pipeline, server, auth, imports, and the LLM proxy (translate/summarize/llm routes, AssistRun honesty contract) — and how to review changes against them?"
    kind: policy
    scope: project
    audience: [agent]
    validated: "2026-07-17"
    depends_on: [claude-instructions]
    triggers: [security, xss, escaping, sanitise, auth, csp, untrusted-input]
    hints:
      token_estimate: 4300
      priority: critical

  - id: skill-software-testing
    path: .claude/skills/software-testing.md
    intent: "How to write tests that find bugs here — the typecheck/test/build gate, regression discipline, and live verification."
    scope: project
    audience: [agent]
    validated: "2026-07-17"
    depends_on: [claude-instructions]
    triggers: [testing, vitest, rtl, regression, qa, verification]
    hints:
      token_estimate: 2300

  - id: skill-cvpartner-import
    path: .claude/skills/cvpartner-import.md
    intent: "What CVpartner-format quirks and importer invariants must be preserved when touching importer.ts?"
    scope: module
    audience: [agent]
    validated: "2026-07-17"
    depends_on: [claude-instructions, data-model]
    triggers: [cvpartner, importer, locale-detection, import]
    hints:
      token_estimate: 1600

  - id: skill-cartavio-brand
    path: .claude/skills/cartavio-brand.md
    intent: "What are the Cartavio brand colors, fonts, and design tokens all UI must follow? Includes the WCAG-AA text-safe variants and self-hosted font setup."
    scope: project
    audience: [agent]
    validated: "2026-07-17"
    triggers: [brand, design, colors, fonts, tokens, styling, contrast]
    hints:
      token_estimate: 1400

  # ── Vendored third-party skills (Apache-2.0 / openly distributed) ─────────
  - id: skill-webapp-testing
    path: .claude/skills/webapp-testing/SKILL.md
    intent: "How to drive and verify the running web app with Playwright — E2E checks, screenshots, browser logs?"
    scope: project
    audience: [agent]
    validated: "2026-06-10"
    depends_on: [skill-software-testing]
    triggers: [e2e, playwright, browser, smoke-test, screenshot, live-verification]
    hints:
      token_estimate: 1000

  - id: skill-web-design-guidelines
    path: .claude/skills/web-design-guidelines/SKILL.md
    intent: "How to audit UI code against Web Interface Guidelines — accessibility, focus, interaction states?"
    scope: project
    audience: [agent]
    validated: "2026-06-10"
    depends_on: [skill-cartavio-brand]
    triggers: [accessibility, a11y, ui-audit, ux-review, wcag]
    hints:
      token_estimate: 300

  - id: skill-github-actions-docs
    path: .claude/skills/github-actions-docs/SKILL.md
    intent: "How to ground GitHub Actions workflow changes in official documentation instead of stale memory?"
    scope: project
    audience: [agent]
    validated: "2026-06-10"
    depends_on: [ci-policy, release-policy]
    triggers: [github-actions, workflow, ci-config, runners, release-pipeline]
    hints:
      token_estimate: 3350   # SKILL.md + references/topic-map.md

  - id: external-skills-pointer
    path: .claude/skills/external-skills.md
    intent: "Which proprietary skills (docx/pdf export QA) live outside this repo, where, and when to use them?"
    scope: project
    audience: [agent]
    validated: "2026-06-10"
    depends_on: [skill-export-pipeline]
    triggers: [docx-inspection, pdf-inspection, export-qa, external-skills, ooxml]
    hints:
      token_estimate: 400

  # ── Plans (historical design rationale — every plan has been resolved) ────
  - id: plan-roadmap
    path: plans/improvement-roadmap.md
    intent: "How were improvements prioritised in the June 2026 full-solution review, and what happened to each item? Every entry is now done, dropped, or explicitly deferred — a historical record, not a live plan. Live future work: CLAUDE.md §12."
    scope: global
    audience: [human, developer, agent]
    validated: "2026-07-17"
    update_frequency: never
    depends_on: [claude-instructions]
    triggers: [roadmap, design-rationale, priorities, what-happened-to]
    not_for: ["current shipped behavior", "what to build next"]
    hints:
      token_estimate: 4400
      priority: reference

  - id: plan-unify-showcase
    path: plans/unify-showcase-into-categories.md
    intent: "How was the Skills Showcase unified into the skill-category system? IMPLEMENTED (2026-07-04) — SkillCategory entities, Skill.category_id, virtual showcase section (lib/showcase.ts), shape v6 migration, By-category rename/reorder. See CLAUDE.md §1/§4/§8 for the current-state summary; this plan is now a historical design record."
    scope: project
    audience: [developer, agent]
    validated: "2026-07-04"
    update_frequency: never
    depends_on: [claude-instructions]
